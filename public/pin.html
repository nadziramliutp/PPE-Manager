<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter PIN — PPE System</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#111827" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="container header-inner">
        <a href="/index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#6b7280;font-size:14px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back
        </a>
        <div class="header-title" id="header-title">Enter PIN</div>
        <div style="width:40px;"></div>
      </div>
    </header>

    <main class="container" style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;">
      <div style="width:100%;max-width:340px;">
        <div class="card card-body" style="text-align:center;">
          <div style="width:48px;height:48px;background:#f3f4f6;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;" id="pin-icon">
            <svg width="24" height="24" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <h2 style="font-size:18px;font-weight:700;margin-bottom:6px;" id="pin-title">Access PIN</h2>
          <p style="font-size:13px;color:#6b7280;margin-bottom:28px;" id="pin-subtitle">Enter your 4-digit PIN to continue</p>

          <div class="pin-inputs">
            <input class="pin-input" type="password" inputmode="numeric" maxlength="1" autocomplete="off" />
            <input class="pin-input" type="password" inputmode="numeric" maxlength="1" autocomplete="off" />
            <input class="pin-input" type="password" inputmode="numeric" maxlength="1" autocomplete="off" />
            <input class="pin-input" type="password" inputmode="numeric" maxlength="1" autocomplete="off" />
          </div>

          <div class="pin-dots" style="margin-top:14px;margin-bottom:20px;">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
          </div>

          <div id="pin-error" style="min-height:20px;font-size:13px;color:#ef4444;"></div>
          <div id="pin-loading" class="hidden" style="display:flex;justify-content:center;gap:5px;margin-top:4px;">
            <span style="width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:spin 1s ease infinite;"></span>
          </div>
        </div>

        <p style="text-align:center;font-size:12px;color:#9ca3af;margin-top:16px;">Contact HSE officer if you forgot your PIN</p>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const role = params.get('for') === 'hse' ? 'hse' : 'worker';

    // Update UI based on role
    if (role === 'hse') {
      document.getElementById('header-title').textContent = 'HSE Dashboard';
      document.getElementById('pin-title').textContent = 'HSE Officer Access';
      document.getElementById('pin-subtitle').textContent = 'Enter HSE officer PIN to access dashboard';
    } else {
      document.getElementById('header-title').textContent = 'PPE Issuance';
      document.getElementById('pin-title').textContent = 'Worker Access';
      document.getElementById('pin-subtitle').textContent = 'Enter worker PIN to access PPE form';
    }

    // If already authenticated, redirect
    if (role === 'hse' && Session.isHse()) { window.location.href = '/dashboard.html'; }
    if (role === 'worker' && Session.isWorker()) { window.location.href = '/worker.html'; }

    let isLoading = false;

    const pin = initPinInputs(async (enteredPin) => {
      if (isLoading) return;
      isLoading = true;
      document.getElementById('pin-error').textContent = '';
      document.getElementById('pin-loading').classList.remove('hidden');

      try {
        const res = await API.post('/api/verify-pin', { pin: enteredPin, role });
        if (res.success) {
          if (role === 'hse') { Session.setHse(); window.location.href = '/dashboard.html'; }
          else { Session.setWorker(); window.location.href = '/worker.html'; }
        } else {
          pin.shake();
          pin.clear();
          document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
        }
      } catch {
        document.getElementById('pin-error').textContent = 'Connection error. Try again.';
        pin.clear();
      } finally {
        isLoading = false;
        document.getElementById('pin-loading').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
