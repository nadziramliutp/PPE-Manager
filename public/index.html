<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPE Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="container header-inner">
        <div>
          <div class="header-title">PPE Management</div>
          <div class="header-sub" style="font-size:11px;color:#9ca3af;">Health, Safety & Environment</div>
        </div>
      </div>
    </header>

    <main class="container" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:40px;padding-bottom:40px;">
      <div style="text-align:center;margin-bottom:40px;">
        <div style="width:56px;height:56px;background:#111827;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg width="28" height="28" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L3 7l9 5 9-5-9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 17l9 5 9-5"/></svg>
        </div>
        <h1 style="font-size:22px;font-weight:700;color:#111827;margin-bottom:6px;">ESH Department TMEKL</h1>
        <p style="font-size:14px;color:#6b7280;">Select your access type to continue</p>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:500px;">
        
        <!-- Worker Card -->
        <a href="/worker.html" style="text-decoration:none;">
          <div class="card" style="padding:24px;cursor:pointer;transition:border-color 0.15s,transform 0.15s;" onmouseover="this.style.borderColor='#111827';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='#e5e7eb';this.style.transform='none'">
            <div style="width:44px;height:44px;background:#f3f4f6;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;">
              <svg width="22" height="22" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div style="font-size:15px;font-weight:600;color:#111827;margin-bottom:4px;">Worker</div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:16px;">Request PPE equipment</div>
            <div class="btn btn-primary btn-full" style="font-size:13px;padding:8px;">Access Form</div>
          </div>
        </a>

        <!-- HSE Card -->
        <a href="/pin.html?for=hse" style="text-decoration:none;">
          <div class="card" style="padding:24px;cursor:pointer;transition:border-color 0.15s,transform 0.15s;" onmouseover="this.style.borderColor='#111827';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='#e5e7eb';this.style.transform='none'">
            <div style="width:44px;height:44px;background:#f3f4f6;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;">
              <svg width="22" height="22" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </div>
            <div style="font-size:15px;font-weight:600;color:#111827;margin-bottom:4px;">HSE Officer</div>
            <div style="font-size:13px;color:#6b7280;margin-bottom:16px;">Admin dashboard</div>
            <div class="btn btn-outline btn-full" style="font-size:13px;padding:8px;">Dashboard</div>
          </div>
        </a>
      </div>
    </main>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
